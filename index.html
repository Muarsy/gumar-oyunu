<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilişim Performans Ödevi</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // Senin Firebase Kimlik Bilgilerin
        const firebaseConfig = {
            apiKey: "AIzaSyDd-omHEk9QNLQf74Kcu0I5D4pRuKkqZbQ",
            authDomain: "murat-odev-proje.firebaseapp.com",
            databaseURL: "https://murat-odev-proje-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "murat-odev-proje",
            storageBucket: "murat-odev-proje.firebasestorage.app",
            messagingSenderId: "410325181058",
            appId: "1:410325181058:web:08de2a21332bcd345b8a9b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Küresel Değişkenler
        let mevcutKullanici = "";
        let mevcutBakiye = 0;

        // 1. GİRİŞ YAPMA FONKSİYONU
        window.girisYap = function() {
            const nickInput = document.getElementById('nick-girdi');
            const nick = nickInput.value.trim().replace(/[^a-zA-Z0-9_]/g, ""); // Güvenli nick

            if(nick === "") { alert("Geçerli bir kullanıcı adı gir Baboli!"); return; }

            mevcutKullanici = nick;
            
            // Veritabanında bu kullanıcı var mı kontrol et, yoksa 1000 Coin ile oluştur
            const userRef = ref(db, 'oyuncular/' + mevcutKullanici);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                if (data === null) {
                    set(userRef, { bakiye: 1000 });
                } else {
                    mevcutBakiye = data.bakiye;
                    document.getElementById('bakiye-miktari').innerText = mevcutBakiye;
                }
            }, { onlyOnce: true });

            // Ekranları Değiştir
            document.getElementById('giris-ekrani').style.display = 'none';
            document.getElementById('ana-oyun-ekrani').style.display = 'flex';
            document.getElementById('kullanici-adi').innerText = mevcutKullanici;

            // Canlı Veri Dinleyicilerini Başlat
            canliVerileriDinle();
        }

        // 2. CANLI VERİ DİNLEME (SOHBET VE BAKİYE)
        function canliVerileriDinle() {
            // Bakiyeyi anlık dinle
            onValue(ref(db, 'oyuncular/' + mevcutKullanici + '/bakiye'), (snapshot) => {
                if(snapshot.exists()) {
                    mevcutBakiye = snapshot.val();
                    document.getElementById('bakiye-miktari').innerText = mevcutBakiye;
                }
            });

            // Sohbeti anlık dinle
            onValue(ref(db, 'sohbet'), (snapshot) => {
                const sohbetKutusu = document.getElementById('sohbet-kutusu');
                sohbetKutusu.innerHTML = "";
                const veriler = snapshot.val();
                if(veriler) {
                    Object.values(veriler).forEach(m => {
                        sohbetKutusu.innerHTML += `<div><b>${m.gonderen}:</b> ${m.mesaj}</div>`;
                    });
                    sohbetKutusu.scrollTop = sohbetKutusu.scrollHeight;
                }
            });
        }

        // 3. ZAR ATMA VE KUMAR MANTIĞI
        window.zarAt = function() {
            const bahisInput = document.getElementById('bahis-miktari');
            const bahis = parseInt(bahisInput.value);

            if(isNaN(bahis) || bahis <= 0) { alert("Düzgün bir bahis gir Kral!"); return; }
            if(bahis > mevcutBakiye) { alert("Yetersiz bakiye, o kadar Coinin yok!"); return; }

            const zar = Math.floor(Math.random() * 6) + 1;
            document.getElementById('zar-sonuc').innerText = zar;

            let yeniBakiye = mevcutBakiye;
            if(zar >= 4) {
                yeniBakiye += bahis;
                document.getElementById('oyun-mesaji').innerText = `KAZANDIN! +${bahis} Coin!`;
                document.getElementById('oyun-mesaji').style.color = "#2ea043";
            } else {
                yeniBakiye -= bahis;
                document.getElementById('oyun-mesaji').innerText = `KAYBETTİN! -${bahis} Coin.`;
                document.getElementById('oyun-mesaji').style.color = "#f85149";
            }

            // Veritabanında bakiyeyi güncelle
            update(ref(db, 'oyuncular/' + mevcutKullanici), { bakiye: yeniBakiye });
            bahisInput.value = "";
        }

        // 4. CANLI SOHBET MESAJ GÖNDERME
        window.mesajGonder = function() {
            const mesajGirdi = document.getElementById('mesaj-girdi');
            const mesaj = mesajGirdi.value.trim();
            if(mesaj === "") return;

            const yeniMesajRef = ref(db, 'sohbet/' + Date.now());
            set(yeniMesajRef, {
                gonderen: mevcutKullanici,
                mesaj: mesaj
            });
            mesajGirdi.value = "";
        }

        // 5. COIN TRANSFER SİSTEMİ
        window.paraGonder = function() {
            const aliciInput = document.getElementById('transfer-alici');
            const miktarInput = document.getElementById('transfer-miktar');
            const alici = aliciInput.value.trim();
            const miktar = parseInt(miktarInput.value);

            if(alici === mevcutKullanici) { alert("Kendine para gönderemezsin Kankiş!"); return; }
            if(isNaN(miktar) || miktar <= 0) { alert("Düzgün bir miktar gir!"); return; }
            if(miktar > mevcutBakiye) { alert("Yetersiz bakiye!"); return; }

            // Alıcıyı kontrol et
            onValue(ref(db, 'oyuncular/' + alici), (snapshot) => {
                if(snapshot.exists()) {
                    const aliciEskiBakiye = snapshot.val().bakiye;
                    
                    // Gönderenin parasını düş, alıcınınkini arttır
                    update(ref(db, 'oyuncular/' + mevcutKullanici), { bakiye: mevcutBakiye - miktar });
                    update(ref(db, 'oyuncular/' + alici), { bakiye: aliciEskiBakiye + miktar });
                    
                    // Sisteme transfer mesajı düş
                    set(ref(db, 'sohbet/' + Date.now()), {
                        gonderen: "🏦 SİSTEM",
                        mesaj: `${mevcutKullanici}, ${alici} adlı oyuncuya ${miktar} Coin fırlattı!`
                    });

                    alert("Transfer Başarılı Baboli!");
                    aliciInput.value = "";
                    miktarInput.value = "";
                } else {
                    alert("Böyle bir oyuncu bulunamadı! Önce sisteme bir kere giriş yapmalı.");
                }
            }, { onlyOnce: true });
        }
    </script>

    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 0; }
        #giris-ekrani { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        #ana-oyun-ekrani { display: none; height: 100vh; }
        .panel { border: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        #sol-panel { width: 25%; background-color: #161b22; }
        #orta-panel { width: 50%; background-color: #0d1117; justify-content: center; align-items: center; text-align: center; }
        #sag-panel { width: 25%; background-color: #161b22; }
        button { background-color: #238636; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        input { background-color: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; margin-bottom: 10px; }
        #sohbet-kutusu { flex-grow: 1; border: 1px solid #30363d; background-color: #0d1117; margin-bottom: 10px; padding: 10px; overflow-y: auto; text-align: left; }
        .zar-ekrani { font-size: 5rem; margin: 20px 0; color: #58a6ff; }
    </style>
</head>
<body>

    <div id="giris-ekrani">
        <h1>🎲 SİBER KUMARHANE GİRİŞ 🎲</h1>
        <p>Kullanıcı adını yaz ve masaya otur Baboli:</p>
        <input type="text" id="nick-girdi" placeholder="Kullanıcı Adın (Örn: Alper_Kral)">
        <button onclick="girisYap()">Kumarhaneye Gir</button>
    </div>

    <div id="ana-oyun-ekrani">
        <div class="panel" id="sol-panel">
            <h2>Profil</h2>
            <p>Kullanıcı: <b id="kullanici-adi">-</b></p>
            <p>Bakiye: <b id="bakiye-miktari">0</b> Coin</p>
            <hr style="border-color: #30363d;">
            <h3>Coin Transferi</h3>
            <input type="text" id="transfer-alici" placeholder="Alıcı adı...">
            <input type="number" id="transfer-miktar" placeholder="Miktar...">
            <button onclick="paraGonder()">Coin Gönder</button>
        </div>

        <div class="panel" id="orta-panel">
            <h1>🎲 ZAR DÜELLOSU </h1>
            <p>4, 5, 6 katlar; 1, 2, 3 kasa yutar!</p>
            <input type="number" id="bahis-miktari" placeholder="Bahis Miktarı...">
            <br>
            <button onclick="zarAt()">Zarı Fırlat!</button>
            <div class="zar-ekrani" id="zar-sonuc">?</div>
            <div id="oyun-mesaji">Bahis bekleniyor...</div>
        </div>

        <div class="panel" id="sag-panel">
            <h2>Sınıf Sohbeti</h2>
            <div id="sohbet-kutusu"></div>
            <input type="text" id="mesaj-girdi" placeholder="Mesaj yaz...">
            <button onclick="mesajGonder()">Gönder</button>
        </div>
    </div>

</body>
</html>
