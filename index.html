<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilişim Teknolojileri - Gelişmiş Web Projesi</title>
    
    <!-- Google Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDd-omHEk9QNLQf74Kcu0I5D4pRuKkqZbQ",
            authDomain: "murat-odev-proje.firebaseapp.com",
            databaseURL: "https://murat-odev-proje-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "murat-odev-proje",
            storageBucket: "murat-odev-proje.firebasestorage.app",
            messagingSenderId: "410325181058",
            appId: "1:410325181058:web:08de2a21332bcd345b8a9b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let mevcutKullanici = "";
        let mevcutBakiye = 0;
        let adminModuActive = false;
        let susturulduDurumu = false;

        // MULTIPLAYER 21 DEĞİŞKENLERİ
        let aktifMasaId = null;

        // 1. SİSTEME GİRİŞ
        window.girisYap = function() {
            const nickInput = document.getElementById('nick-girdi');
            const nick = nickInput.value.trim().replace(/[^a-zA-Z0-9_]/g, "");

            if(nick === "") { alert("Geçerli bir kullanıcı adı gir Baboli!"); return; }

            onValue(ref(db, 'banli/' + nick), (snapshot) => {
                if(snapshot.exists()) {
                    alert("Kural ihlali nedeniyle bu kumarhaneden BANLANDINIZ!");
                    location.reload();
                } else {
                    mevcutKullanici = nick;
                    oyunuBaslat();
                }
            }, { onlyOnce: true });
        }

        function oyunuBaslat() {
            document.getElementById('giris-ekrani').style.display = 'none';
            document.getElementById('ana-oyun-ekrani').style.display = 'flex';
            document.getElementById('kullanici-adi').innerText = mevcutKullanici;

            const userRef = ref(db, 'oyuncular/' + mevcutKullanici);
            onValue(userRef, (snapshot) => {
                if (!snapshot.exists()) {
                    set(userRef, { bakiye: 1000, susturuldu: false });
                }
            }, { onlyOnce: true });

            canliDinleyicileriBaslat();
            atYarisiDongusu();
        }

        // 2. CANLI VERİ AKIŞI
        function canliDinleyicileriBaslat() {
            onValue(ref(db, 'oyuncular/' + mevcutKullanici), (snapshot) => {
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    mevcutBakiye = data.bakiye;
                    susturulduDurumu = data.susturuldu || false;
                    document.getElementById('bakiye-miktari').innerText = mevcutBakiye;
                }
            });

            onValue(ref(db, 'banli/' + mevcutKullanici), (snapshot) => {
                if(snapshot.exists()) {
                    alert("Yönetici tarafından az önce BANLANDINIZ!");
                    location.reload();
                }
            });

            onValue(ref(db, 'sohbet'), (snapshot) => {
                const sohbetKutusu = document.getElementById('sohbet-kutusu');
                sohbetKutusu.innerHTML = "";
                if(snapshot.exists()) {
                    Object.values(snapshot.val()).forEach(m => {
                        sohbetKutusu.innerHTML += `<div><b>${m.gonderen}:</b> ${m.mesaj}</div>`;
                    });
                    sohbetKutusu.scrollTop = sohbetKutusu.scrollHeight;
                }
            });

            onValue(ref(db, 'oyuncular'), (snapshot) => {
                const skorGovde = document.getElementById('skor-tablosu-govde');
                skorGovde.innerHTML = "";
                if(snapshot.exists()) {
                    const oyuncular = [];
                    Object.entries(snapshot.val()).forEach(([isim, detay]) => {
                        oyuncular.push({ isim: isim, bakiye: detay.bakiye });
                    });
                    oyuncular.sort((a, b) => b.bakiye - a.bakiye);
                    oyuncular.forEach((o, index) => {
                        skorGovde.innerHTML += `<tr><td>${index+1}</td><td>${o.isim}</td><td>${o.bakiye}</td></tr>`;
                    });
                }
            });

            // Canlı 21 Masalarını İzle
            onValue(ref(db, 'blackjack_masalari'), (snapshot) => {
                const liste = document.getElementById('aktif-masalar-listesi');
                liste.innerHTML = "";
                if(snapshot.exists()) {
                    Object.entries(snapshot.val()).forEach(([masaid, masa]) => {
                        if(!masa.bitti) {
                            liste.innerHTML += `<div>
                                <b>${masa.kurucu}</b> vs <b>${masa.rakip || 'Bekleniyor...'}</b> (Bahis: ${masa.bahis}) 
                                ${!masa.rakip && masa.kurucu !== mevcutKullanici ? `<button onclick="masayaKatil('${masaid}')" style="padding:2px 5px; font-size:0.8rem;">Meydan Oku</button>` : ''}
                            </div>`;
                            if(masa.kurucu === mevcutKullanici || masa.rakip === mevcutKullanici) {
                                aktifMasaId = masaid;
                                duelloEkraniniGuncelle(masa);
                            }
                        }
                    });
                }
            });
        }

        window.mesajGonder = function() {
            if(susturulduDurumu) { alert("Susturuldun, mesaj gönderemezsin!"); return; }
            const mesajGirdi = document.getElementById('mesaj-girdi');
            const mesaj = mesajGirdi.value.trim();
            if(mesaj === "") return;

            set(ref(db, 'sohbet/' + Date.now()), {
                gonderen: adminModuActive ? "👑 ADMIN (" + mevcutKullanici + ")" : mevcutKullanici,
                mesaj: mesaj
            });
            mesajGirdi.value = "";
        }

        window.paraGonder = function() {
            const alici = document.getElementById('transfer-alici').value.trim();
            const miktar = parseInt(document.getElementById('transfer-miktar').value);

            if(alici === mevcutKullanici) { alert("Kendine para atamazsın!"); return; }
            if(isNaN(miktar) || miktar <= 0 || miktar > mevcutBakiye) { alert("Geçersiz miktar!"); return; }

            onValue(ref(db, 'oyuncular/' + alici), (snapshot) => {
                if(snapshot.exists()) {
                    const aliciEskiBakiye = snapshot.val().bakiye;
                    update(ref(db, 'oyuncular/' + mevcutKullanici), { bakiye: mevcutBakiye - miktar });
                    update(ref(db, 'oyuncular/' + alici), { bakiye: aliciEskiBakiye + miktar });
                    alert("Para başarıyla gönderildi!");
                } else { alert("Oyuncu bulunamadı!"); }
            }, { onlyOnce: true });
        }

        // ================= CANLI GLOBAL AT YARIŞI (10 Saniye Döngü) =================
        let atBahisSecim = null;
        let atBahisMiktar = 0;

        function atYarisiDongusu() {
            const atZamanRef = ref(db, 'sistem/at_yarisi_sure');
            onValue(atZamanRef, (snapshot) => {
                let kalanSure = snapshot.val();
                if(kalanSure === null) return;
                
                document.getElementById('at-sayac').innerText = kalanSure;

                if(kalanSure > 0) {
                    document.getElementById('at-durum-mesaj').innerText = "Bahisler Alınıyor! Atını Seç ve Paranı Yatır.";
                    document.getElementById('at-butonlar-alani').style.display = "block";
                } else if(kalanSure === 0) {
                    document.getElementById('at-butonlar-alani').style.display = "none";
                    document.getElementById('at-durum-mesaj').innerText = "Atlar kapıdan çıktı! Koşuyorlar... 🏁";
                    
                    // Sonucu sadece tek bir kişiden dinle (yarış bittiğinde tetiklenir)
                    onValue(ref(db, 'sistem/at_yarisi_sonuc'), (sonucSnap) => {
                        if(sonucSnap.exists()) {
                            const kazanan = sonucSnap.val();
                            let isimler = ["Şahbatur", "Gülbatur", "Bold Pilot"];
                            document.getElementById('at-durum-mesaj').innerText = `Yarış Bitti! Kazanan: ${kazanan}. At (${isimler[kazanan-1]})!`;
                            
                            if(atBahisSecim !== null) {
                                if(atBahisSecim === kazanan) {
                                    let kazanc = atBahisMiktar * 3;
                                    update(ref(db, 'oyuncular/' + mevcutKullanici), { bakiye: mevcutBakiye + kazanc });
                                    alert(`Tebrikler! At Yarışından ${kazanc} Coin kazandın!`);
                                } else {
                                    alert(`Yarışı kaybettin. -${atBahisMiktar} Coin.`);
                                }
                                atBahisSecim = null;
                                atBahisMiktar = 0;
                            }
                        }
                    }, { onlyOnce: true });
                }
            });
        }

        window.atBahisYatır = function(atNo) {
            const miktar = parseInt(document.getElementById('bahis-at').value);
            if(isNaN(miktar) || miktar <= 0 || miktar > mevcutBakiye) { alert("Geçersiz bakiye veya miktar!"); return; }
            if(atBahisSecim !== null) { alert("Zaten bu yarış için bahis oynadın!"); return; }

            atBahisSecim = atNo;
            atBahisMiktar = miktar;
            update(ref(db, 'oyuncular/' + mevcutKullanici), { bakiye: mevcutBakiye - miktar });
            let isimler = ["Şahbatur", "Gülbatur", "Bold Pilot"];
            alert(`${isimler[atNo-1]} üzerine ${miktar} Coin yatırıldı! Sürenin bitmesini bekle.`);
        }

        // ================= CANLI 21 DÜELLOSU (MULTIPLAYER MULTIPLAYER) =================
        window.duelloMasaKur = function() {
            const bahis = parseInt(document.getElementById('bahis-duello').value);
            if(isNaN(bahis) || bahis <= 0 || bahis > mevcutBakiye) { alert("Geçersiz bahis!"); return; }

            const mId = "masa_" + Date.now();
            update(ref(db, 'oyuncular/' + mevcutKullanici), { bakiye: mevcutBakiye - bahis });

            set(ref(db, 'blackjack_masalari/' + mId), {
                id: mId,
                kurucu: mevcutKullanici,
                kurucuKartlar: [kartCek(), kartCek()],
                rakip: "",
                rakipKartlar: [],
                bahis: bahis,
                sira: mevcutKullanici,
                bitti: false,
                durumMesaj: "Rakip bekleniyor..."
            });
            aktifMasaId = mId;
            document.getElementById('duello-lobi-alani').style.display = "block";
        }

        window.masayaKatil = function(mId) {
            onValue(ref(db, 'blackjack_masalari/' + mId), (snapshot) => {
                if(snapshot.exists()) {
                    const masa = snapshot.val();
                    if(masa.bahis > mevcutBakiye) { alert("Paran bu masaya yetmiyor Baboli!"); return; }
                    if(masa.rakip !== "") return;

                    update(ref(db, 'oyuncular/' + mevcutKullanici), { bakiye: mevcutBakiye - masa.bahis });
                    update(ref(db, 'blackjack_masalari/' + mId), {
                        rakip: mevcutKullanici,
                        rakipKartlar: [kartCek(), kartCek()],
                        durumMesaj: `Meydan okuma başladı! Sıra: ${masa.kurucu}`
                    });
                    aktifMasaId = mId;
                    document.getElementById('duello-lobi-alani').style.display = "block";
                }
            }, { onlyOnce: true });
        }

        function kartCek() { return Math.floor(Math.random() * 10) + 1; }
        function kartToplam(kartlar) { return kartlar ? kartlar.reduce((a, b) => a + b, 0) : 0; }

        function duelloEkraniniGuncelle(masa) {
            document.getElementById('duello-durum-metni').innerText = masa.durumMesaj;
            
            const benKurucuym = (masa.kurucu === mevcutKullanici);
            const kKartlar = masa.kurucuKartlar || [];
            const rKartlar = masa.rakipKartlar || [];

            document.getElementById('duello-kurucu-skor').innerText = `${masa.kurucu}: ${kKartlar.join(", ")} (Toplam: ${kartToplam(kKartlar)})`;
            document.getElementById('duello-rakip-skor').innerText = `${masa.rakip || 'Bekleniyor'}: ${rKartlar.join(", ")} (Toplam: ${kartToplam(rKartlar)})`;

            if(!masa.bitti && masa.sira === mevcutKullanici && masa.rakip !== "") {
                document.getElementById('duello-aksiyon-butonlari').style.display = "block";
            } else {
                document.getElementById('duello-aksiyon-butonlari').style.display = "none";
            }
        }

        window.duelloKartAl = function() {
            onValue(ref(db, 'blackjack_masalari/' + aktifMasaId), (snapshot) => {
                if(!snapshot.exists()) return;
                const masa = snapshot.val();
                if(masa.sira !== mevcutKullanici || masa.bitti) return;

                const benKurucuym = (masa.kurucu === mevcutKullanici);
                let yeniKartlar = benKurucuym ? [...masa.kurucuKartlar, kartCek()] : [...masa.rakipKartlar, kartCek()];
                let toplam = kartToplam(yeniKartlar);

                let guncelleme = {};
                if(benKurucuym) {
                    guncelleme.kurucuKartlar = yeniKartlar;
                    if(toplam > 21) {
                        guncelleme.sira = masa.rakip;
                        guncelleme.durumMesaj = `${mevcutKullanici} 21'i geçti! Sıra rakipte.`;
                    }
                } else {
                    guncelleme.rakipKartlar = yeniKartlar;
                    if(toplam > 21) {
                        duelloBitir(masa, yeniKartlar, masa.kurucuKartlar);
                        return;
                    }
                }
                update(ref(db, 'blackjack_masalari/' + aktifMasaId), guncelleme);
            }, { onlyOnce: true });
        }

        window.duelloDur = function() {
            onValue(ref(db, 'blackjack_masalari/' + aktifMasaId), (snapshot) => {
                if(!snapshot.exists()) return;
                const masa = snapshot.val();
                if(masa.sira !== mevcutKullanici || masa.bitti) return;

                if(masa.kurucu === mevcutKullanici) {
                    update(ref(db, 'blackjack_masalari/' + aktifMasaId), {
                        sira: masa.rakip,
                        durumMesaj: `${mevcutKullanici} durdu. Sıra rakipte!`
                    });
                } else {
                    duelloBitir(masa, masa.kurucuKartlar, masa.rakipKartlar);
                }
            }, { onlyOnce: true });
        }

        function duelloBitir(masa, kKart, rKart) {
            const kTop = kartToplam(kKart);
            const rTop = kartToplam(rKart);
            let kazanan = "";
            let mesaj = "";

            if (kTop > 21 && rTop > 21) { kazanan = "berabere"; mesaj = "İki oyuncu da patladı! Berabere."; }
            else if (kTop > 21) { kazanan = masa.rakip; mesaj = `${masa.rakip} kazandı!`; }
            else if (rTop > 21) { kazanan = masa.kurucu; mesaj = `${masa.kurucu} kazandı!`; }
            else if (kTop > rTop) { kazanan = masa.kurucu; mesaj = `${masa.kurucu} daha yüksek puanla kazandı!`; }
            else if (rTop > kTop) { kazanan = masa.rakip; mesaj = `${masa.rakip} daha yüksek puanla kazandı!`; }
            else { kazanan = "berabere"; mesaj = "Skorlar eşit! Berabere."; }

            let ödül = masa.bahis * 2;
            if(kazanan === mevcutKullanici) {
                update(ref(db, 'oyuncular/' + mevcutKullanici), { bakiye: mevcutBakiye + ödül });
            } else if (kazanan === "berabere") {
                update(ref(db, 'oyuncular/' + masa.kurucu), { bakiye: mevcutBakiye + masa.bahis }); // İade mantığı sunucudan ayarlanmalı, test için basitleştirildi
            }

            update(ref(db, 'blackjack_masalari/' + masa.id), {
                bitti: true,
                durumMesaj: `Oyun Bitti! ${mesaj}`
            });
            alert(mesaj);
            document.getElementById('duello-lobi-alani').style.display = "none";
        }

        // ================= GİZLİ ADMIN PANEL MANTIĞI =================
        window.adminGirisDene = function() {
            const sifre = document.getElementById('admin-sifre-girdi').value;
            if(sifre === "1029384756Murat.") {
                adminModuActive = true;
                document.getElementById('admin-panel-icerik').style.display = "block";
                document.getElementById('admin-giris-alani').style.display = "none";
                alert("Hoş geldin Büyük Patron Murat ÖZ. Kumarhane senin emirlerini bekliyor!");
            } else { alert("Hatalı Şifre!"); }
        }

        window.adminBanla = function() {
            const hedef = document.getElementById('admin-hedef-oyuncu').value.trim();
            if(hedef === "") return;
            set(ref(db, 'banli/' + hedef), true);
            remove(ref(db, 'oyuncular/' + hedef));
            alert(`${hedef} tamamen BANLANDI!`);
        }

        window.adminSustur = function() {
            const hedef = document.getElementById('admin-hedef-oyuncu').value.trim();
            if(hedef === "") return;
            update(ref(db, 'oyuncular/' + hedef), { susturuldu: true });
            alert(`${hedef} susturuldu!`);
        }

        window.adminSusturAc = function() {
            const hedef = document.getElementById('admin-hedef-oyuncu').value.trim();
            if(hedef === "") return;
            update(ref(db, 'oyuncular/' + hedef), { susturuldu: false });
        }

        window.adminParaVer = function() {
            const hedef = document.getElementById('admin-hedef-oyuncu').value.trim();
            const miktar = parseInt(document.getElementById('admin-para-miktar').value);
            if(hedef === "" || isNaN(miktar)) return;

            onValue(ref(db, 'oyuncular/' + hedef + '/bakiye'), (snapshot) => {
                let mevcut = snapshot.val() || 0;
                update(ref(db, 'oyuncular/' + hedef), { bakiye: mevcut + miktar });
                alert(`${hedef} hesabına ${miktar} Coin eklendi!`);
            }, { onlyOnce: true });
        }
    </script>

    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
        #giris-ekrani { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
        #ana-oyun-ekrani { display: none; width: 100vw; height: 100vh; }
        .panel { border: 1px solid #30363d; padding: 15px; display: flex; flex-direction: column; box-sizing: border-box; overflow-y: auto; }
        #sol-panel { width: 25%; background-color: #161b22; }
        #orta-panel { width: 50%; background-color: #0d1117; text-align: center; }
        #sag-panel { width: 25%; background-color: #161b22; }
        button { background-color: #238636; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 6px; font-weight: bold; margin: 3px; }
        button:hover { background-color: #2ea043; }
        .btn-danger { background-color: #da3637; }
        input { background-color: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 6px; margin-bottom: 5px; width: 85%; }
        #sohbet-kutusu { flex-grow: 1; border: 1px solid #30363d; background-color: #0d1117; margin-bottom: 10px; padding: 10px; overflow-y: auto; text-align: left; height: 200px; }
        .oyun-kutusu { border: 1px solid #30363d; background-color: #161b22; margin: 10px 0; padding: 10px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th, td { border: 1px solid #30363d; padding: 6px; text-align: center; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="giris-ekrani">
        <h1 style="color: #58a6ff;">🎰 SİBER MULTIPLAYER CASINO v3.0 🎰</h1>
        <input type="text" id="nick-girdi" placeholder="Kullanıcı Adınızı Seçin..." style="width: 300px; text-align: center; font-size: 1.1rem;">
        <br>
        <button onclick="girisYap()" style="font-size: 1.1rem; padding: 10px 30px;">Giriş Yap</button>
    </div>

    <div id="ana-oyun-ekrani">
        <div class="panel" id="sol-panel">
            <h3>👤 Profil</h3>
            <p>Oyuncu: <b id="kullanici-adi" style="color: #58a6ff;">-</b></p>
            <p>Cüzdan: <b id="bakiye-miktari" style="color: #2ea043;">0</b> Coin</p>
            <hr style="border-color: #30363d;">
            <h3>💸 Transfer</h3>
            <input type="text" id="transfer-alici" placeholder="Alıcı Nick...">
            <input type="number" id="transfer-miktar" placeholder="Miktar...">
            <button onclick="paraGonder()">Gönder</button>
            <hr style="border-color: #30363d;">
            <h3>🏆 Canlı Sıralama</h3>
            <table>
                <thead><tr><th>#</th><th>Oyuncu</th><th>Coin</th></tr></thead>
                <tbody id="skor-tablosu-govde"></tbody>
            </table>
        </div>

        <div class="panel" id="orta-panel">
            <!-- 10 SANİYE SÜREKLİ AT YARIŞI -->
            <div class="oyun-kutusu" style="border-color: #f2cc60;">
                <h3 style="color: #f2cc60; margin: 0;">🏁 CANLI HİPODROM (Global Döngü)</h3>
                <p style="font-size: 1.2rem; margin: 5px 0;">Yarışın Başlamasına Son: <b id="at-sayac" style="color:#da3637; font-size: 1.5rem;">10</b> Saniye!</p>
                <div id="at-durum-mesaj" style="font-weight: bold; color: #58a6ff;">Sistem bekleniyor...</div>
                
                <div id="at-butonlar-alani" style="margin-top: 10px;">
                    <input type="number" id="bahis-at" placeholder="Yarış Bahisi..." style="width: 40%;"><br>
                    <button onclick="atBahisYatır(1)" style="background-color: #8a6321;">1. Şahbatur (3x)</button>
                    <button onclick="atBahisYatır(2)" style="background-color: #8a6321;">2. Gülbatur (3x)</button>
                    <button onclick="atBahisYatır(3)" style="background-color: #8a6321;">3. Bold Pilot (3x)</button>
                </div>
            </div>

            <!-- CANLI 21 DÜELLOSU -->
            <div class="oyun-kutusu" style="border-color: #58a6ff;">
                <h3 style="color: #58a6ff; margin: 0;">🃏 PVP 21 DÜELLOSU Masası</h3>
                <input type="number" id="bahis-duello" placeholder="Masa Bahis Miktarı..." style="width: 50%; margin-top:5px;">
                <button onclick="duelloMasaKur()">Masa Kur / Meydan Oku</button>
                
                <h4 style="margin: 10px 0 5px 0;">Açık Masalar</h4>
                <div id="aktif-masalar-listesi" style="font-size: 0.9rem; background: #0d1117; padding: 5px; border-radius: 5px;"></div>

                <!-- Aktif Maç Ekranı -->
                <div id="duello-lobi-alani" style="display:none; background:#21262d; padding:10px; border-radius:8px; margin-top:10px;">
                    <p id="duello-durum-metni" style="color:#f2cc60; font-weight:bold;"></p>
